name: Vulhub Format Check and Lint

on: [push, pull_request]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    - name: install dependencies
      run: |
        python -m pip install -U pytest
        sudo wget -O /usr/local/bin/hadolint https://github.com/hadolint/hadolint/releases/download/v2.14.0/hadolint-Linux-x86_64
        sudo chmod +x /usr/local/bin/hadolint
    - name: Check
      run: |
        python -m pytest tests/check
  markdown-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-node@v6
      with:
        node-version: "24"
    - name: install dependencies
      env:
        AUTOCORRECT_VERSION: v2.16.3
      run: |
        set -euo pipefail
        npm install -g markdownlint-cli@0.47.0

        archive="autocorrect-linux-amd64.tar.gz"
        base_url="https://github.com/huacnlee/autocorrect/releases/download/${AUTOCORRECT_VERSION}"
        tmpdir="$(mktemp -d)"
        trap 'rm -rf "${tmpdir}"' EXIT
        curl -fsSL "${base_url}/${archive}" -o "${tmpdir}/${archive}"
        curl -fsSL "${base_url}/${archive}.sha256" -o "${tmpdir}/${archive}.sha256"
        cd "${tmpdir}"
        echo "$(cat "${archive}.sha256")  ${archive}" | sha256sum -c -
        tar -xzf "${archive}"
        install_dir="${RUNNER_TEMP}/autocorrect/bin"
        mkdir -p "${install_dir}"
        install -m 0755 autocorrect "${install_dir}/autocorrect"
        echo "${install_dir}" >> "${GITHUB_PATH}"
    - name: check Chinese copywriting
      run: |
        files=$(find . -path ./node_modules -prune -o -name 'README.zh-cn.md' -print | sort)
        autocorrect --lint $files
    - name: check markdown
      run: |
        markdownlint -c tests/markdownlint.json -r tests/tools/markdownlint-rule-cjk-inline-spacing.cjs .
